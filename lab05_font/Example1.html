<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example1</title>
</head>
<style>
    @font-face {
        font-family: myFirstFont;
        src: url(pop/Poppins-Black.ttf);
    }
    h1{
        line-height: 1.2em;
        font-size: 1.2em;
        margin: 0.5in;
        font-family: 'myFirstFont',sans-serif;
    }
    h2{
        line-height: 3cm;

    }
    h3{
        word-spacing: 4mm;

    }
    h4{
        font-size: 10pt !important;
    }
    h4{
        font-size: 2pc;
    }
    p{
        font-size: 0.875em;
    }
    p.p1{
        font-size: large;
        font-family: Arial, Helvetica, sans-serif;
    }
    p.p2{
        font-size: 6ex;
        font-family: 'Times New Roman', Times, serif;
        font-variant: small-caps;
        font-weight: 600;
    }
    p.p3{
        font-size: 150%;
    }
</style>
<body>
    <h1>Heading1</h1>
    <h2>Heading2</h2>
    <h3>Heading3</h3>
    <h4>Heading4</h4>

    <p>This is font</p>
    <p class ="p1">This is font1</p>
    <p class ="p2">This is font2</p>
    <p class ="p3">This is font3</p>
    
</body>
</html>
