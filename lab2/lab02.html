<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
*{
    margin: 0;
    padding: 0;
}
header{
    background-color:rgb(26, 90, 44);
    color: white;
    padding:10px;
    margin-bottom: 5px;
    font-family: sans-serif;
}
/*บน ขวา ล่าง ซ้าย*/
        nav ul li{
            display: inline;
            font-family:sans-serif;
            padding-right: 10px;
        }
        section{
            border:1px solid black;
            background-color: rgb(174, 252, 234);
            font-family: sans-serif;
            padding:15px;
        }
        article{
            border:1px solid black;
            background-color: white;
            margin:15px;
            padding:10px;
        }
        h2{
            margin-bottom: 5px;
        }
        footer{
            background-color: rgb(26, 90, 44);
            color: white;
            font-family:sans-serif;
            margin-top: 10px;
            padding:10px;
        }
        .contentcenter{
            position: absolute;
            top: 58%;
            left: 58%;
            transform: translate(-100%,-100%);
        }

</style>
<body>
    <header>
        <h1>Assignmen#2</h1>
       
    </header>
    <nav>
        <ul>
            <li>Home</li>
            <li>Manu1</li>
            <li>Manu2</li>
            <li>Menu3</li>
        </ul>
    </nav>
    <section>
        <h2>HTML5</h2>
        <article>
            <h2>What is html5(video)</h2>
            <p><div>
                <video src="video_for_ass2.mp4"controls width="300"></video>
            </div></p>
        </article>
        <article>
            <h2>Image</h2>
    
            <p><div>
                <img src="image_for_ass2.jpg" alt=""width="600"> <canvas id="canvas" ></canvas>
            </div></p>
            <p><div class="contentcenter"><h2><p>Canvas</p></h2>
               
            </div></p>
        </article>
    </section>
    <footer><p>&copy : 2015 WDT.All rights reserved.</p></footer>
</body>
<script>
    var c = document.getElementById("canvas")
    var ctx = c.getContext('2d')
    ctx.fillStyle = "#047B12"
    ctx.fillRect(100,45,160,80)
     /*ขวา/ซ้าย,บน/ล่าง/กว้าง/สูง*/ 
</script>
</html>
